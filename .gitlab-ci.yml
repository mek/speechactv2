stages:
  - test
  - secret-detection
  - validate
  - package

sast:
  stage: test

secret_detection:
  stage: secret-detection

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

variables:
  SECRET_DETECTION_ENABLED: 'true'

validate:governance:
  stage: validate
  image: alpine:latest
  script:
    - sh tools/check-docs-freshness.sh
    - sh tools/check-speechacts.sh
    - sh tools/check-canonical-sync.sh
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

package:governance-seed:
  stage: package
  image: alpine:latest
  script:
    - apk add --no-cache git
    - sh tools/package-release.sh "$CI_COMMIT_TAG"
  artifacts:
    paths:
      - dist/
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG
